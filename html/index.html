<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>new-test | DevOps Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 700px;
    }
    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    .subtitle { font-size: 1.2rem; color: #aaa; margin-bottom: 2rem; }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      min-width: 130px;
    }
    .icon { font-size: 2rem; margin-bottom: 0.4rem; }
    .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .value { font-size: 1.1rem; font-weight: bold; margin-top: 0.3rem; color: #7ee8a2; }
    .btn {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      background: linear-gradient(135deg, #7ee8a2, #80ff72);
      color: #111;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1rem;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .footer { font-size: 0.85rem; color: #666; }
    .footer a { color: #7ee8a2; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 new-test</h1>
    <p class="subtitle">Deployed successfully via DevOps Agent</p>
    <div class="cards">
      <div class="card">
        <div class="icon">✅</div>
        <div class="label">Status</div>
        <div class="value">Live</div>
      </div>
      <div class="card">
        <div class="icon">☁️</div>
        <div class="label">Cloud</div>
        <div class="value">AWS</div>
      </div>
      <div class="card">
        <div class="icon">🌍</div>
        <div class="label">Region</div>
        <div class="value">us-east-1</div>
      </div>
      <div class="card">
        <div class="icon">🔧</div>
        <div class="label">Server</div>
        <div class="value">nginx</div>
      </div>
    </div>
    <a class="btn" href="#">🚀 Get Started</a>
    <div class="footer">
      Deployed via <a href="https://github.com/rafatusa/new-test">rafatusa/new-test</a>
      &nbsp;·&nbsp; DevOps Agent
    </div>
  </div>
</body>
</html>
