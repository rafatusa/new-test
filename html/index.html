<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live - DevOps Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 700px;
      width: 100%;
    }
    h1 { font-size: 3rem; margin-bottom: 10px; }
    p  { font-size: 1.1rem; color: #ccc; margin-bottom: 30px; }
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 30px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 20px 24px;
      min-width: 130px;
    }
    .icon  { font-size: 2rem; margin-bottom: 6px; }
    .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .value { font-size: 1rem; font-weight: 600; margin-top: 4px; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 30px;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 30px;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .footer { font-size: 0.85rem; color: #888; }
    .footer a { color: #aaa; text-decoration: none; }
    .footer a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Live</h1>
    <p>Deployed successfully with DevOps Agent</p>
    <div class="cards">
      <div class="card">
        <div class="icon">✅</div>
        <div class="label">Status</div>
        <div class="value">Live</div>
      </div>
      <div class="card">
        <div class="icon">☁️</div>
        <div class="label">Cloud</div>
        <div class="value">AWS</div>
      </div>
      <div class="card">
        <div class="icon">🌍</div>
        <div class="label">Region</div>
        <div class="value">us-east-1</div>
      </div>
      <div class="card">
        <div class="icon">🔧</div>
        <div class="label">Server</div>
        <div class="value">nginx</div>
      </div>
    </div>
    <a class="btn" href="#">🚀 Get Started</a>
    <div class="footer">
      Deployed via <a href="https://github.com/rafatusa/new-test">rafatusa/new-test</a>
      &nbsp;·&nbsp; DevOps Agent
    </div>
  </div>
</body>
</html>
