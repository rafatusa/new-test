---
- name: Configure nginx
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for system to be ready
      wait_for_connection:
        timeout: 60

    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Deploy index.html
      copy:
        src: ../html/index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes
